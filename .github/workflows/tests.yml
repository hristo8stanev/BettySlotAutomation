name: Slot Automation Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  desktop-tests:
    name: Desktop Tests
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run Desktop Tests
        run: dotnet test --no-build --configuration Release --filter "FullyQualifiedName~Tests.Desktop" --logger "trx;LogFileName=desktop-results.trx" --results-directory ./test-results

      - name: Upload Desktop Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: desktop-test-results
          path: ./test-results/desktop-results.trx

      - name: Upload Desktop Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-desktop
          path: '**/bin/Release/net10.0/allure-results/**'

  mobile-tests:
    name: Mobile Tests
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run Mobile Tests
        run: dotnet test --no-build --configuration Release --filter "FullyQualifiedName~Tests.Mobile" --logger "trx;LogFileName=mobile-results.trx" --results-directory ./test-results

      - name: Upload Mobile Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobile-test-results
          path: ./test-results/mobile-results.trx

      - name: Upload Mobile Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-mobile
          path: '**/bin/Release/net10.0/allure-results/**'

  report:
    name: Generate Allure Report
    runs-on: ubuntu-latest
    needs: [ desktop-tests, mobile-tests ]
    if: always()

    steps:
      - name: Download Desktop Allure Results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-desktop
          path: allure-results

      - name: Download Mobile Allure Results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-mobile
          path: allure-results

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Allure CLI
        run: |
          curl -o allure.tgz -L https://github.com/allure-framework/allure2/releases/download/2.30.0/allure-2.30.0.tgz
          tar -xzf allure.tgz
          sudo mv allure-2.30.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

      - name: Generate Allure Report
        run: allure generate allure-results --clean -o allure-report

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

  publish-report:
    name: Publish Allure Report to GitHub Pages
    runs-on: ubuntu-latest
    needs: [ report ]
    if: always()

    permissions:
      contents: write
      pages: write

    steps:
      - name: Download Allure Report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Add .nojekyll file
        run: touch allure-report/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
          keep_files: false